<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>군위몰입수학 강사포털 v2</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="강사포털">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', sans-serif; background: #F5F6FA; color: #0f172a; -webkit-tap-highlight-color: transparent; overflow: hidden; height: 100dvh; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input, select, textarea { font-family: inherit; }

    /* ── 레이아웃 ── */
    .app-shell { display: flex; height: 100dvh; overflow: hidden; }
    .sidebar { width: 240px; min-width: 240px; background: #fff; border-right: 1px solid #f1f5f9; display: flex; flex-direction: column; padding: 24px 20px; z-index: 50; transition: transform .3s ease; }
    .sidebar-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; margin-top: 4px; }
    .logo-icon { width: 44px; height: 44px; background: #0f172a; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #fb923c; transform: rotate(-3deg); flex-shrink: 0; }
    .logo-title { font-size: 15px; font-weight: 900; color: #0f172a; line-height: 1.1; }
    .logo-sub { font-size: 9px; font-weight: 900; color: #f97316; letter-spacing: .1em; text-transform: uppercase; margin-top: 3px; }
    .nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .nav-btn { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 16px; font-size: 13px; font-weight: 900; color: #94a3b8; transition: all .2s; width: 100%; text-align: left; }
    .nav-btn:hover { background: #f8fafc; color: #475569; }
    .nav-btn.active-orange { background: #f97316; color: #fff; }
    .nav-btn.active-dark { background: #0f172a; color: #fff; }
    .nav-btn.active-green { background: #10b981; color: #fff; }
    .nav-btn.active-purple { background: #8b5cf6; color: #fff; }
    .nav-btn.active-red { background: #ef4444; color: #fff; }
    .nav-btn.active-blue { background: #3b82f6; color: #fff; }
    .sidebar-footer { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .main { flex: 1; overflow-y: auto; padding: 36px 40px; }
    .main-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    .header-eyebrow { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: .15em; margin-bottom: 4px; }
    .header-title { font-size: 28px; font-weight: 900; color: #0f172a; letter-spacing: -.03em; }
    .mobile-menu-btn { display: none; position: fixed; top: 14px; right: 14px; z-index: 60; width: 44px; height: 44px; background: #0f172a; color: #fff; border-radius: 14px; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.3); z-index: 40; backdrop-filter: blur(4px); }

    /* ── 카드 ── */
    .card { background: #fff; border: 1px solid #f1f5f9; border-radius: 24px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .card-title { font-size: 14px; font-weight: 900; color: #0f172a; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .stat-card { background: #fff; border: 1px solid #f1f5f9; border-radius: 20px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .stat-label { font-size: 10px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
    .stat-val { font-size: 32px; font-weight: 900; }

    /* ── 로그인 ── */
    .login-wrap { height: 100dvh; display: flex; align-items: center; justify-content: center; background: #F5F6FA; padding: 24px; }
    .login-box { background: #fff; border: 1px solid #f1f5f9; border-radius: 32px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
    .login-logo { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
    .login-title { font-size: 22px; font-weight: 900; color: #0f172a; margin-bottom: 6px; }
    .login-sub { font-size: 13px; font-weight: 700; color: #94a3b8; margin-bottom: 28px; }
    .login-input { width: 100%; background: #f8fafc; border: 2px solid transparent; border-radius: 16px; padding: 14px 18px; font-size: 14px; font-weight: 700; outline: none; transition: border-color .2s; margin-bottom: 12px; color: #0f172a; }
    .login-input:focus { border-color: #fb923c; }
    .login-btn { width: 100%; padding: 16px; font-size: 15px; font-weight: 900; color: #fff; background: #0f172a; border-radius: 16px; margin-top: 8px; transition: background .15s; }
    .login-btn:hover { background: #1e293b; }
    .login-err { font-size: 12px; font-weight: 700; color: #ef4444; text-align: center; margin-top: 8px; }

    /* ── 폼 요소 ── */
    .form-input { width: 100%; background: #f8fafc; border: 2px solid transparent; border-radius: 14px; padding: 12px 16px; font-size: 13px; font-weight: 700; outline: none; transition: border-color .2s; color: #0f172a; }
    .form-input:focus { border-color: #fb923c; }
    .form-textarea { width: 100%; background: #f8fafc; border: 2px solid transparent; border-radius: 14px; padding: 12px 16px; font-size: 13px; font-weight: 700; outline: none; transition: border-color .2s; color: #0f172a; resize: vertical; min-height: 100px; }
    .form-textarea:focus { border-color: #fb923c; }
    .form-select { width: 100%; background: #f8fafc; border: 2px solid transparent; border-radius: 14px; padding: 12px 16px; font-size: 13px; font-weight: 700; outline: none; color: #0f172a; cursor: pointer; }
    .form-label { font-size: 11px; font-weight: 900; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .08em; }

    /* ── 버튼 ── */
    .btn-primary { padding: 12px 20px; background: #0f172a; color: #fff; border-radius: 14px; font-size: 13px; font-weight: 900; transition: background .15s; display: flex; align-items: center; gap: 6px; }
    .btn-primary:hover { background: #1e293b; }
    .btn-orange { background: #f97316; }
    .btn-orange:hover { background: #ea6c0a; }
    .btn-green { background: #10b981; }
    .btn-green:hover { background: #059669; }
    .btn-purple { background: #8b5cf6; }
    .btn-purple:hover { background: #7c3aed; }
    .btn-red { background: #ef4444; }
    .btn-red:hover { background: #dc2626; }
    .btn-blue { background: #3b82f6; }
    .btn-blue:hover { background: #2563eb; }
    .btn-sm { padding: 8px 14px; font-size: 12px; border-radius: 10px; }

    /* ── 인쇄 버튼 ── */
    .btn-print { padding: 10px 16px; background: #fff; border: 2px solid #e2e8f0; color: #475569; border-radius: 14px; font-size: 13px; font-weight: 900; transition: all .15s; display: flex; align-items: center; gap: 6px; }
    .btn-print:hover { background: #0f172a; color: #fff; border-color: #0f172a; }

    /* ── 날짜 필터 바 ── */
    .date-filter-bar { display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #f1f5f9; border-radius: 16px; padding: 12px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04); flex-wrap: wrap; }
    .date-filter-label { font-size: 11px; font-weight: 900; color: #94a3b8; white-space: nowrap; }
    .date-filter-input { padding: 8px 12px; background: #f8fafc; border: 2px solid transparent; border-radius: 12px; font-size: 12px; font-weight: 700; color: #475569; outline: none; transition: border-color .2s; }
    .date-filter-input:focus { border-color: #fb923c; }
    .date-filter-tilde { font-size: 12px; font-weight: 900; color: #cbd5e1; }
    .date-filter-count { font-size: 11px; font-weight: 700; color: #94a3b8; margin-left: auto; }

    /* ── 모달 ── */
    .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(15,23,42,.4); backdrop-filter: blur(6px); display: flex; align-items: flex-start; justify-content: center; padding: 16px; padding-top: 6vh; }
    @media (max-width: 768px) {
        .modal-overlay { align-items: flex-start; padding: 16px; padding-top: 5vh; }
        .modal-box { border-radius: 24px !important; max-height: 88dvh; padding: 22px 18px !important; }
    }
    .modal-box { background: #fff; width: 100%; max-width: 440px; border-radius: 32px; padding: 28px; box-shadow: 0 24px 64px rgba(0,0,0,.15); animation: scaleIn .25s cubic-bezier(.34,1.56,.64,1) both; display: flex; flex-direction: column; gap: 12px; max-height: 85dvh; overflow-y: auto; }
    .modal-title { font-size: 20px; font-weight: 900; color: #0f172a; margin-bottom: 4px; }
    .modal-btns { display: flex; gap: 8px; margin-top: 8px; }
    .btn-cancel { flex: 1; padding: 14px; font-size: 14px; font-weight: 900; color: #94a3b8; background: #f8fafc; border-radius: 16px; }
    .btn-confirm { flex: 1; padding: 14px; font-size: 14px; font-weight: 900; color: #fff; background: #0f172a; border-radius: 16px; }

    /* ── 토스트 ── */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 200; padding: 12px 20px; border-radius: 16px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; animation: scaleIn .25s cubic-bezier(.34,1.56,.64,1) both; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,.15); }
    .toast-success { background: #0f172a; color: #fff; }
    .toast-error { background: #ef4444; color: #fff; }

    /* ── 리스트 아이템 ── */
    .list-item { padding: 16px; border: 1px solid #f1f5f9; border-radius: 16px; background: #fff; display: flex; flex-direction: column; gap: 8px; transition: box-shadow .15s; }
    .list-item:hover { box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .list-meta { font-size: 11px; font-weight: 700; color: #94a3b8; display: flex; align-items: center; gap: 8px; }
    .list-content { font-size: 13px; font-weight: 700; color: #475569; line-height: 1.6; white-space: pre-wrap; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 10px; font-weight: 900; }
    .badge-new { background: #fee2e2; color: #dc2626; }
    .badge-done { background: #d1fae5; color: #059669; }
    .badge-warn { background: #fef3c7; color: #d97706; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }

    /* ── 공지 ── */
    .notice-item { padding: 16px 20px; border-left: 4px solid #f97316; background: #fff7ed; border-radius: 0 14px 14px 0; margin-bottom: 10px; }
    .notice-title { font-size: 14px; font-weight: 900; color: #0f172a; margin-bottom: 4px; }
    .notice-body { font-size: 13px; font-weight: 700; color: #64748b; line-height: 1.6; }
    .notice-date { font-size: 11px; font-weight: 700; color: #94a3b8; margin-top: 6px; }

    /* ── 유저 카드 ── */
    .user-info-card { background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 16px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #0f172a; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; flex-shrink: 0; }
    .user-avatar.admin { background: #f97316; }

    /* ── 로딩/에러 ── */
    .full-center { height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #f97316; border-top-color: transparent; border-radius: 50%; animation: spin .8s linear infinite; }
    .empty-box { padding: 60px 24px; border: 2px dashed #e2e8f0; border-radius: 24px; display: flex; flex-direction: column; align-items: center; gap: 8px; color: #cbd5e1; text-align: center; }

    /* ── 애니메이션 ── */
    @keyframes scaleIn { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn .3s ease both; }
    .spin { animation: spin .8s linear infinite; }

    /* ── 반응형 ── */
    @media (max-width: 768px) {
        .sidebar { position: fixed; inset-y: 0; left: 0; transform: translateX(-100%); box-shadow: 4px 0 24px rgba(0,0,0,.08); }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay.open { display: block; }
        .mobile-menu-btn { display: flex; }
        .main { padding: 20px 16px; padding-top: 72px; }
        .grid-2, .grid-3 { grid-template-columns: 1fr; }
        .header-title { font-size: 22px; }
        .date-filter-bar { gap: 8px; }
    }
    @media (min-width: 769px) { .modal-overlay { align-items: flex-start; } }

    /* ━━━ 인쇄 전용 CSS ━━━ */
    @media print {
        body { overflow: visible !important; height: auto !important; background: #fff !important; font-size: 12pt; }
        .app-shell { display: block !important; height: auto !important; overflow: visible !important; }
        .sidebar, .mobile-menu-btn, .sidebar-overlay { display: none !important; }
        .main { padding: 0 !important; overflow: visible !important; height: auto !important; }
        .main-header { display: none !important; }
        .no-print { display: none !important; }
        .print-only { display: block !important; }
        .print-header { display: flex !important; }
        .date-filter-bar { display: none !important; }
        .list-item { break-inside: avoid; border: 1px solid #e2e8f0 !important; box-shadow: none !important; margin-bottom: 8pt; }
        .list-item:hover { box-shadow: none !important; }
        .btn-print, .btn-primary, .modal-overlay { display: none !important; }
        .badge { border: 1px solid #e2e8f0; }
        .notice-item { break-inside: avoid; }
        .print-section-title {
            font-size: 16pt; font-weight: 900; color: #0f172a;
            border-bottom: 3px solid #0f172a; padding-bottom: 8pt;
            margin: 16pt 0 10pt; display: flex; align-items: center; gap: 8pt;
        }
        .print-section-title.green { border-color: #10b981; color: #10b981; }
        .print-section-title.red   { border-color: #ef4444; color: #ef4444; }
        .print-section-title.purple{ border-color: #8b5cf6; color: #8b5cf6; }
    }
    .print-only { display: none; }
    .print-header { display: none; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const SUPER_ADMIN_PW = '2387008';
const TEACHER_INIT_PW = '1234';

const getKSTDate = (d = new Date()) => new Date(d.getTime() + 9*3600*1000).toISOString().split('T')[0];

const normalizeDate = val => {
    if (!val) return '';
    const s = String(val).replace(/^'+/, '').trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    if (s.includes('T') || s.includes('Z')) return getKSTDate(new Date(s));
    return s.substring(0, 10);
};

const formatDateTime = val => {
    if (!val) return '—';
    try { return new Date(val).toLocaleString('ko-KR', {timeZone:'Asia/Seoul'}); }
    catch(e) { return String(val); }
};

const formatDate = val => {
    if (!val) return '—';
    return normalizeDate(val);
};

const sortByCreatedAt = (arr) =>
    [...arr].sort((a, b) => new Date(b.CreatedAt) - new Date(a.CreatedAt));

const ALL_CLASSES = (() => {
    const out = [];
    [1,2,3,4,5,6].forEach(g => {
        out.push(
            {id:`e${g}-mw-s`, label:`초등 ${g}학년 월목 수반`},
            {id:`e${g}-mw-h`, label:`초등 ${g}학년 월목 학반`},
            {id:`e${g}-hg-s`, label:`초등 ${g}학년 화금 수반`},
            {id:`e${g}-hg-h`, label:`초등 ${g}학년 화금 학반`},
        );
    });
    return out;
})();

const GRADE_GROUPS = [1,2,3,4,5,6].map(g => ({
    grade: `${g}학년`,
    classes: ALL_CLASSES.filter(c => c.id.startsWith(`e${g}-`)),
}));

const getClassLabels = (classStr) => {
    if (!classStr) return [];
    return classStr.split(',').map(id => ALL_CLASSES.find(c=>c.id===id.trim())?.label).filter(Boolean);
};

const SB_URL = 'https://uypqettuaytbcyfhngnq.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5cHFldHR1YXl0YmN5ZmhuZ25xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDYzMTIsImV4cCI6MjA5MjUyMjMxMn0.wwiJAI3jRyPEg_OdO-fy-0c-X4cdPRcZOpdP82tJnEI';

const sbFetch = (path, opts={}) => fetch(`${SB_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Prefer': 'return=representation',
        ...(opts.headers||{})
    }
}).then(r => r.json());

const api = {
    get: async (action) => {
        if (action === 'getTeachers') {
            const data = await sbFetch('teachers?select=*&order=created_at.asc');
            return data.map(t => ({ ID:t.id, Name:t.name, Password:t.password, Classes:t.classes, IsFirst:t.is_first, CreatedAt:t.created_at, Status:t.status||'approved' }));
        }
        if (action === 'getNotices') {
            const data = await sbFetch('notices?select=*&order=created_at.desc');
            return data.map(n => ({ ID:n.id, Title:n.title, Content:n.content, CreatedAt:n.created_at }));
        }
        if (action === 'getJournals') {
            const data = await sbFetch('journals?select=*&order=created_at.desc');
            return data.map(j => ({ ID:j.id, Date:j.date, TeacherName:j.teacher_name, Content:j.content, CreatedAt:j.created_at }));
        }
        if (action === 'getAbsences') {
            const data = await sbFetch('absences?select=*&order=created_at.desc');
            return data.map(a => ({ ID:a.id, Date:a.date, StudentName:a.student_name, ClassName:a.class_name, Reason:a.reason, TeacherName:a.teacher_name, CreatedAt:a.created_at }));
        }
        if (action === 'getCounsels') {
            const data = await sbFetch('counsels?select=*&order=created_at.desc');
            return data.map(c => ({ ID:c.id, Date:c.date, StudentName:c.student_name, ParentName:c.parent_name, Content:c.content, TeacherName:c.teacher_name, CreatedAt:c.created_at }));
        }
        return [];
    },
    post: async (body) => {
        const { action, ...payload } = body;
        const uuid = () => crypto.randomUUID();
        if (action === 'registerTeacher') {
            await sbFetch('teachers', { method:'POST', body: JSON.stringify({ id:uuid(), name:payload.name, password:'1234', classes:'', is_first:true, status:'pending' }) });
            return { success:true };
        }
        if (action === 'approveTeacher') {
            await sbFetch(`teachers?id=eq.${payload.id}`, { method:'PATCH', body: JSON.stringify({ status:'approved' }) });
            return { success:true };
        }
        if (action === 'rejectTeacher') {
            await sbFetch(`teachers?id=eq.${payload.id}`, { method:'DELETE' });
            return { success:true };
        }
        if (action === 'updateTeacherPw') {
            await sbFetch(`teachers?name=eq.${encodeURIComponent(payload.name)}`, { method:'PATCH', body: JSON.stringify({ password:payload.newPw, is_first:false }) });
            return { success:true };
        }
        if (action === 'updateTeacherClasses') {
            await sbFetch(`teachers?name=eq.${encodeURIComponent(payload.name)}`, { method:'PATCH', body: JSON.stringify({ classes:payload.classes }) });
            return { success:true };
        }
        if (action === 'resetTeacherPw') {
            await sbFetch(`teachers?name=eq.${encodeURIComponent(payload.name)}`, { method:'PATCH', body: JSON.stringify({ password:'1234', is_first:true }) });
            return { success:true };
        }
        if (action === 'deleteTeacher') {
            await sbFetch(`teachers?id=eq.${payload.id}`, { method:'DELETE' });
            return { success:true };
        }
        if (action === 'addNotice') {
            await sbFetch('notices', { method:'POST', body: JSON.stringify({ id:uuid(), title:payload.title, content:payload.content }) });
            return { success:true };
        }
        if (action === 'deleteNotice') {
            await sbFetch(`notices?id=eq.${payload.id}`, { method:'DELETE' });
            return { success:true };
        }
        if (action === 'updateNotice') {
            await sbFetch(`notices?id=eq.${payload.id}`, { method:'PATCH', body: JSON.stringify({ title:payload.title, content:payload.content }) });
            return { success:true };
        }
        if (action === 'addJournal') {
            await sbFetch('journals', { method:'POST', body: JSON.stringify({ id:uuid(), date:payload.date, teacher_name:payload.teacherName, content:payload.content }) });
            return { success:true };
        }
        if (action === 'updateJournal') {

/* ━━━ 날짜 필터 + 인쇄 공통 바 (C방법: 빠른탭 + 직접입력) ━━━ */
const PrintFilterBar = ({ dateFrom, dateTo, onDateFrom, onDateTo, count, total, onPrint, teacherFilter, onTeacherFilter, teachers, showTeacherFilter=false }) => {
    const today = getKSTDate();
    const getWeekRange = () => {
        const d = new Date();
        const day = d.getDay();
        const mon = new Date(d); mon.setDate(d.getDate() - (day===0?6:day-1));
        const sun = new Date(mon); sun.setDate(mon.getDate()+6);
        return [getKSTDate(mon), getKSTDate(sun)];
    };
    const getMonthRange = () => {
        const d = new Date();
        const first = new Date(d.getFullYear(), d.getMonth(), 1);
        const last  = new Date(d.getFullYear(), d.getMonth()+1, 0);
        return [getKSTDate(first), getKSTDate(last)];
    };
    const activeTab = (() => {
        if (!dateFrom && !dateTo) return 'all';
        if (dateFrom===today && dateTo===today) return 'today';
        const [ws,we] = getWeekRange();
        if (dateFrom===ws && dateTo===we) return 'week';
        const [ms,me] = getMonthRange();
        if (dateFrom===ms && dateTo===me) return 'month';
        return 'custom';
    })();
    const setTab = (tab) => {
        if (tab==='all')   { onDateFrom(''); onDateTo(''); }
        if (tab==='today') { onDateFrom(today); onDateTo(today); }
        if (tab==='week')  { const [s,e]=getWeekRange();  onDateFrom(s); onDateTo(e); }
        if (tab==='month') { const [s,e]=getMonthRange(); onDateFrom(s); onDateTo(e); }
    };
    const tabs = [
        {id:'all',label:'전체'},{id:'today',label:'오늘'},
        {id:'week',label:'이번주'},{id:'month',label:'이번달'},
    ];
    return (
        <div className="date-filter-bar no-print" style={{flexDirection:'column',gap:10,padding:'14px 16px'}}>
            <div style={{display:'flex',gap:6,width:'100%'}}>
                {tabs.map(t=>(
                    <button key={t.id} onClick={()=>setTab(t.id)} style={{
                        flex:1,padding:'7px 0',borderRadius:10,fontSize:12,fontWeight:900,
                        background:activeTab===t.id?'#0f172a':'#f8fafc',
                        color:activeTab===t.id?'#fff':'#94a3b8',
                        border:`2px solid ${activeTab===t.id?'#0f172a':'#f1f5f9'}`,
                        transition:'all .15s',
                    }}>{t.label}</button>
                ))}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                <span style={{fontSize:11,fontWeight:900,color:'#94a3b8',flexShrink:0}}>📅</span>
                <input className="date-filter-input" type="date" value={dateFrom} onChange={e=>onDateFrom(e.target.value)} style={{flex:1,minWidth:0}}/>
                <span style={{fontSize:12,fontWeight:900,color:'#cbd5e1',flexShrink:0}}>~</span>
                <input className="date-filter-input" type="date" value={dateTo} onChange={e=>onDateTo(e.target.value)} style={{flex:1,minWidth:0}}/>
                {showTeacherFilter && (
                    <select className="date-filter-input" value={teacherFilter} onChange={e=>onTeacherFilter(e.target.value)} style={{flex:1,minWidth:0}}>
                        <option value="ALL">전체 강사</option>
                        {teachers.map(t=><option key={t.ID||t.name} value={t.Name||t.name}>{t.Name||t.name}</option>)}
                    </select>
                )}
                <button className="btn-print" onClick={onPrint} style={{flexShrink:0}}>
                    <Icon name="print" size={15}/> 인쇄
                </button>
            </div>
            {(dateFrom||dateTo) && (
                <div style={{fontSize:11,fontWeight:700,color:'#94a3b8'}}>
                    필터: <span style={{color:'#f97316',fontWeight:900}}>{count}건</span> / 전체 {total}건
                </div>
            )}
        </div>
    );
};

/* ━━━ 전체 백업 버튼 (슈퍼관리자 전용) ━━━ */
const BackupButton = ({ journals, counsels, absences, notices, teachers }) => {
    const [backing, setBacking] = useState(false);

    const handleBackup = async () => {
        setBacking(true);
        try {
            const backup = {
                exportedAt: new Date().toLocaleString('ko-KR', {timeZone:'Asia/Seoul'}),
                notices,
                journals,
                absences,
                counsels,
                teachers: teachers.map(t => ({...t, Password: '***'})),
            };
            const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `군위몰입수학_백업_${getKSTDate()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        } catch(e) {}
        finally { setBacking(false); }
    };

    return (
        <button onClick={handleBackup} disabled={backing}
            style={{display:'flex',alignItems:'center',gap:6,padding:'10px 16px',borderRadius:14,fontSize:12,fontWeight:900,
                background:'#1e293b',color:'#fff',border:'2px solid #334155',transition:'all .15s',opacity:backing?0.7:1}}>
            <Icon name="download" size={14}/>
            {backing ? '백업 중...' : '전체 데이터 백업'}
        </button>
    );
};

/* ━━━ 데이터 복구 (슈퍼관리자 전용) 3단계 확인 ━━━ */
const RestoreButton = ({ onRestoreDone }) => {
    const [step, setStep] = useState(0);
    const [backupData, setBackupData] = useState(null);
    const [fileErr, setFileErr] = useState('');
    const [checked, setChecked] = useState(false);
    const [pw, setPw] = useState('');
    const [pwErr, setPwErr] = useState('');
    const [restoring, setRestoring] = useState(false);
    const [progress, setProgress] = useState('');
    const fileRef = useRef(null);

    const reset = () => {
        setStep(0); setBackupData(null); setFileErr('');
        setChecked(false); setPw(''); setPwErr('');
        setRestoring(false); setProgress('');
    };

    const handleFile = (e) => {
        setFileErr('');
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                if (!data.notices || !data.journals || !data.absences || !data.counsels) {
                    setFileErr('올바른 백업 파일이 아닙니다'); return;
                }
                setBackupData(data); setStep(1);
            } catch(e) { setFileErr('파일 읽기 실패: 올바른 JSON 파일을 선택해 주세요'); }
        };
        reader.readAsText(file); e.target.value = '';
    };

    const handleRestore = async () => {
        if (pw !== SUPER_ADMIN_PW) { setPwErr('비밀번호가 틀렸습니다'); return; }
        setStep(4); setRestoring(true);
        try {
            setProgress('기존 공지사항 삭제 중...');
            const existNotices = await sbFetch('notices?select=id');
            for (const n of existNotices) await sbFetch('notices?id=eq.'+n.id, {method:'DELETE'});

            setProgress('기존 근무일지 삭제 중...');
            const existJournals = await sbFetch('journals?select=id');
            for (const j of existJournals) await sbFetch('journals?id=eq.'+j.id, {method:'DELETE'});

            setProgress('기존 결석사유 삭제 중...');
            const existAbsences = await sbFetch('absences?select=id');
            for (const a of existAbsences) await sbFetch('absences?id=eq.'+a.id, {method:'DELETE'});

            setProgress('기존 상담기록 삭제 중...');
            const existCounsels = await sbFetch('counsels?select=id');
            for (const c of existCounsels) await sbFetch('counsels?id=eq.'+c.id, {method:'DELETE'});

            setProgress('공지사항 복원 중... ('+backupData.notices.length+'건)');
            for (const n of backupData.notices)
                await sbFetch('notices', {method:'POST', body: JSON.stringify({id:n.ID, title:n.Title, content:n.Content, created_at:n.CreatedAt})});

            setProgress('근무일지 복원 중... ('+backupData.journals.length+'건)');
            for (const j of backupData.journals)
                await sbFetch('journals', {method:'POST', body: JSON.stringify({id:j.ID, date:j.Date, teacher_name:j.TeacherName, content:j.Content, created_at:j.CreatedAt})});

            setProgress('결석사유 복원 중... ('+backupData.absences.length+'건)');
            for (const a of backupData.absences)
                await sbFetch('absences', {method:'POST', body: JSON.stringify({id:a.ID, date:a.Date, student_name:a.StudentName, class_name:a.ClassName||'', reason:a.Reason, teacher_name:a.TeacherName, created_at:a.CreatedAt})});

            setProgress('상담기록 복원 중... ('+backupData.counsels.length+'건)');
            for (const c of backupData.counsels)
                await sbFetch('counsels', {method:'POST', body: JSON.stringify({id:c.ID, date:c.Date, student_name:c.StudentName, parent_name:c.ParentName||'', content:c.Content, teacher_name:c.TeacherName, created_at:c.CreatedAt})});

            setProgress('✅ 복구 완료!');
            setTimeout(() => { reset(); if(onRestoreDone) onRestoreDone(); }, 2500);
        } catch(e) {
            setProgress('❌ 오류 발생: '+e.message);
            setTimeout(reset, 3000);
        } finally { setRestoring(false); }
    };

    const stepLabels = ['파일 확인','경고 확인','비번 확인'];

    return (
        <>
            <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={handleFile}/>
            <button onClick={()=>fileRef.current.click()}
                style={{display:'flex',alignItems:'center',gap:6,padding:'10px 16px',borderRadius:14,fontSize:12,fontWeight:900,
                    background:'#450a0a',color:'#fca5a5',border:'2px solid #7f1d1d',transition:'all .15s',width:'100%'}}>
                <Icon name="alert" size={14}/> 데이터 복구
            </button>
            {fileErr && <div style={{fontSize:11,color:'#ef4444',fontWeight:700,padding:'4px 8px'}}>{fileErr}</div>}

            {step >= 1 && (
                <div className="modal-overlay no-print" onClick={e=>e.target===e.currentTarget&&reset()}>
                    <div className="modal-box" style={{maxWidth:460}}>

                        {/* 단계 표시 바 */}
                        {step <= 3 && (
                            <div style={{display:'flex',gap:6,marginBottom:4}}>
                                {stepLabels.map((s,i)=>(
                                    <div key={i} style={{flex:1,textAlign:'center',fontSize:10,fontWeight:900,padding:'5px 0',borderRadius:8,
                                        background: step>i+1?'#d1fae5': step===i+1?'#ef4444':'#f8fafc',
                                        color: step>i+1?'#059669': step===i+1?'#fff':'#cbd5e1',
                                    }}>{step>i+1?'✅ ':''}{s}</div>
                                ))}
                            </div>
                        )}

                        {/* STEP 1 — 파일 미리보기 */}
                        {step===1 && <>
                            <div className="modal-title">📂 1단계 — 백업 파일 확인</div>
                            <div style={{background:'#f8fafc',borderRadius:14,padding:16,display:'flex',flexDirection:'column',gap:8}}>
                                <div style={{fontSize:12,fontWeight:700,color:'#64748b'}}>
                                    백업 날짜: <span style={{color:'#0f172a',fontWeight:900}}>{backupData.exportedAt}</span>
                                </div>
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:4}}>
                                    {[
                                        {label:'📋 근무일지', count:backupData.journals.length,  color:'#10b981'},
                                        {label:'⚠️ 결석사유', count:backupData.absences.length,  color:'#ef4444'},
                                        {label:'💬 상담기록', count:backupData.counsels.length,  color:'#8b5cf6'},
                                        {label:'📢 공지사항', count:backupData.notices.length,   color:'#3b82f6'},
                                    ].map(item=>(
                                        <div key={item.label} style={{background:'#fff',border:'1px solid #f1f5f9',borderRadius:12,padding:'12px 14px'}}>
                                            <div style={{fontSize:11,fontWeight:700,color:'#94a3b8'}}>{item.label}</div>
                                            <div style={{fontSize:22,fontWeight:900,color:item.color}}>{item.count}건</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div style={{padding:'12px 14px',background:'#fff7ed',borderRadius:12,fontSize:12,fontWeight:700,color:'#92400e',lineHeight:1.8}}>
                                ⚠️ 이 파일로 복구 시 <strong>현재 DB의 모든 데이터가 삭제</strong>되고 백업 내용으로 교체됩니다.
                            </div>
                            <div className="modal-btns">
                                <button className="btn-cancel" onClick={reset}>취소</button>
                                <button className="btn-confirm" style={{background:'#ef4444'}} onClick={()=>setStep(2)}>다음 단계 →</button>
                            </div>
                        </>}

                        {/* STEP 2 — 경고 체크박스 */}
                        {step===2 && <>

const LoginScreen = ({ onLogin }) => {
    const [name, setName] = useState('');
    const [pw,   setPw]   = useState('');
    const [err,  setErr]  = useState('');
    const [loading, setLoading] = useState(false);

    const handleLogin = async () => {
        setErr(''); setLoading(true);
        try {
            const trimName = name.trim();
            if (!trimName && pw === SUPER_ADMIN_PW) { onLogin({ role:'admin', name:'관리자', isSuper:true }); return; }
            const ADMIN_LIST = ['김남탁','김유식','사공은경','김윤희','홍상진'];
            if (ADMIN_LIST.includes(trimName)) {
                if (pw !== '321!') { setErr('비밀번호가 틀렸습니다'); return; }
                onLogin({ role:'admin', name:trimName, isFirst:false, isSuper:false }); return;
            }
            if (!trimName) { setErr('이름을 입력해 주세요'); return; }
            const teachers = await api.get('getTeachers');
            const found = Array.isArray(teachers) ? teachers.find(t=>t.Name===trimName) : null;
            if (!found) {
                if (pw !== TEACHER_INIT_PW) { setErr('처음 로그인은 초기 비번을 사용해 주세요'); return; }
                await api.post({ action:'registerTeacher', name:trimName });
                onLogin({ role:'teacher', name:trimName, isFirst:true, status:'pending' });
            } else {
                if (found.Password !== pw) { setErr('비밀번호가 틀렸습니다'); return; }
                if (found.Status === 'pending') {
                    onLogin({ role:'teacher', name:found.Name, isFirst:false, status:'pending' });
                    return;
                }
                onLogin({ role:'teacher', name:found.Name, isFirst:found.IsFirst||false, classes:found.Classes||'', status:'approved' });
            }
        } catch(e) { setErr('연결 오류: '+e.message); }
        finally { setLoading(false); }
    };

    return (
        <div className="login-wrap">
            <div className="login-box">
                <div className="login-logo">
                    <div className="logo-icon"><Icon name="sparkles" size={22}/></div>
                    <div><div className="logo-title">군위몰입수학</div><div className="logo-sub">Staff Portal</div></div>
                </div>
                <div style={{marginBottom:20,fontSize:13,fontWeight:700,color:'#94a3b8',textAlign:'center'}}>이름과 비밀번호를 입력해 주세요</div>
                <input className="login-input" placeholder="이름" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
                <input className="login-input" type="password" placeholder="비밀번호" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
                <button className="login-btn" onClick={handleLogin} disabled={loading}>{loading?'확인 중...':'로그인'}</button>
                {err && <div className="login-err">{err}</div>}
                <div style={{marginTop:16,padding:'12px 16px',background:'#fff7ed',borderRadius:14,fontSize:12,fontWeight:700,color:'#92400e',lineHeight:1.8}}>
                    <div style={{fontWeight:900,marginBottom:6}}>로그인 안내</div>
                    <div>강사: <span style={{color:'#f97316',fontWeight:900}}>이름 / 1234</span></div>
                    <div>관리자: <span style={{color:'#0f172a',fontWeight:900}}>이름 / 알려드린 비번</span></div>
                    <div>슈퍼관리자: <span style={{color:'#0f172a',fontWeight:900}}>비번만 입력</span></div>
                </div>
            </div>
        </div>
    );
};

            setCounsels(Array.isArray(c)?c:[]); setAbsences(Array.isArray(a)?a:[]);
            setTeachers(Array.isArray(t)?t:[]);
        } catch(e){ setApiError(e.message); }
        finally { setLoading(false); }
    }, []);

    const navItems = [
        {id:'dashboard', label:'전체 현황',    icon:'sparkles', active:'active-orange', count:null},

            <aside className={`sidebar ${sidebarOpen?'open':''}`}>

                    <div><div className="logo-title">군위몰입수학</div><div className="logo-sub">관리자포탈 V2</div></div>
                </div>
                <nav className="nav">
                    {navItems.map(btn => (
                        <button key={btn.id} className={`nav-btn ${view===btn.id?btn.active:''}`} onClick={()=>{setView(btn.id);setSidebar(false);}}
                            style={{justifyContent:'space-between'}}>
                            <span style={{display:'flex',alignItems:'center',gap:10}}>
                                <Icon name={btn.icon} size={17}/> {btn.label}
                            </span>
                            {!loading && btn.count !== null && btn.count > 0 && (
                                <span style={{
                                    fontSize:10, fontWeight:900, minWidth:22, height:18,
                                    borderRadius:99, display:'flex', alignItems:'center', justifyContent:'center',
                                    padding:'0 6px',
                                    background: view===btn.id ? 'rgba(255,255,255,0.25)' : btn.countColor+'22',
                                    color: view===btn.id ? '#fff' : btn.countColor,

                </nav>
                <div className="sidebar-footer">
                    <div className="user-info-card">
                        <div className="user-avatar admin">{user.isSuper?'관':user.name[0]}</div>
                        <div><div style={{fontSize:13,fontWeight:900,color:'#1e293b'}}>{user.name} 관리자</div><div style={{fontSize:11,fontWeight:700,color:'#94a3b8'}}>{user.isSuper?'최고 관리자':'관리자'}</div></div>

};

/* ━━━ 공지사항 뷰 ━━━ */
const NoticeView = ({ notices: initialNotices, isAdmin, showToast, reload }) => {
    const [notices, setNotices] = useState(initialNotices);
    const [showModal, setShowModal] = useState(false);
    const [form, setForm] = useState({ title:'', content:'' });
    const [saving, setSaving] = useState(false);
    const [editTarget, setEditTarget] = useState(null);
    useEffect(() => { setNotices(initialNotices); }, [initialNotices]);
    const sorted = sortByCreatedAt(notices);

    const handleSave = async () => {
        if (!form.title.trim()||!form.content.trim()) return;
        setSaving(true);
        const tempId = 'temp-'+Date.now();
        const newN = { ID:tempId, Title:form.title, Content:form.content, CreatedAt:new Date().toISOString() };
        if (editTarget) {
            setNotices(prev=>prev.map(n=>n.ID===editTarget?newN:n));
            setForm({title:'',content:''}); setShowModal(false); setEditTarget(null);
            showToast('공지사항이 수정되었습니다');
            try { await api.post({action:'deleteNotice',id:editTarget}); await api.post({action:'addNotice',...form}); reload(); }
            catch(e){ showToast('저장 실패','error'); reload(); }
        } else {
            setNotices(prev=>[newN,...prev]);
            setForm({title:'',content:''}); setShowModal(false);
            showToast('공지사항이 등록되었습니다');
            try { await api.post({action:'addNotice',...form}); reload(); }
            catch(e){ showToast('저장 실패','error'); reload(); }
        }
        setSaving(false);
    };

    return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12,paddingBottom:40}}>
            {isAdmin && (
                <div style={{display:'flex',justifyContent:'flex-end',marginBottom:4}}>
                    <button className="btn-primary btn-blue" onClick={()=>{setForm({title:'',content:''});setEditTarget(null);setShowModal(true);}}>
                        <Icon name="plus" size={15}/> 공지 작성
                    </button>
                </div>
            )}
            {sorted.length===0 ? <div className="empty-box"><p style={{fontWeight:700}}>공지사항이 없습니다</p></div> :
                sorted.map(n=>(
                    <div key={n.ID} className="notice-item" style={{position:'relative',paddingRight:isAdmin?60:20}}>
                        <div className="notice-title">{n.Title}</div>
                        <div className="notice-body" style={{whiteSpace:'pre-wrap'}}>{n.Content}</div>
                        <div className="notice-date">{n.CreatedAt?formatDateTime(n.CreatedAt):''}</div>
                        {isAdmin && (
                            <div style={{position:'absolute',top:12,right:12,display:'flex',gap:4}} className="no-print">
                                <button onClick={()=>{setForm({title:n.Title,content:n.Content});setEditTarget(n.ID);setShowModal(true);}} style={{color:'#94a3b8',padding:4}}><Icon name="pencil" size={14}/></button>
                                <button onClick={async()=>{if(!confirm('삭제?'))return;setNotices(prev=>prev.filter(x=>x.ID!==n.ID));showToast('삭제됨');try{await api.post({action:'deleteNotice',id:n.ID});reload();}catch{showToast('실패','error');}}} style={{color:'#cbd5e1',padding:4}}><Icon name="trash" size={14}/></button>
                            </div>
                        )}
                    </div>
                ))
            }
            {showModal && (
                <div className="modal-overlay no-print" onClick={e=>e.target===e.currentTarget&&(setShowModal(false),setEditTarget(null))}>
                    <div className="modal-box">
                        <div className="modal-title">{editTarget?'공지사항 수정':'공지사항 작성'}</div>
                        <div><div className="form-label">제목</div><input className="form-input" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="공지 제목"/></div>
                        <div><div className="form-label">내용</div><textarea className="form-textarea" value={form.content} onChange={e=>setForm(f=>({...f,content:e.target.value}))} placeholder="공지 내용" style={{minHeight:140}}/></div>
                        <div className="modal-btns">
                            <button className="btn-cancel" onClick={()=>{setShowModal(false);setEditTarget(null);}}>취소</button>
                            <button className="btn-confirm" style={{background:'#3b82f6'}} onClick={handleSave} disabled={saving}>{saving?'저장 중...':editTarget?'수정':'등록'}</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

const JournalView = ({ journals: initialJournals, user, today, showToast, reload }) => {

    const [dateTo,   setDateTo]   = useState('');
    useEffect(() => { setJournals(initialJournals); }, [initialJournals]);

    const myJournals = useMemo(() => sortByCreatedAt(journals.filter(j=>j.TeacherName===user.name)), [journals,user]);
    const filtered = useMemo(() => myJournals.filter(j => {
        const d = normalizeDate(j.Date);
        if (dateFrom && d < dateFrom) return false;
        if (dateTo   && d > dateTo)   return false;
        return true;
    }), [myJournals, dateFrom, dateTo]);

    const handleSave = async () => {
        if (!content.trim()) return; setSaving(true);

            showToast('일지가 수정되었습니다'); setContent(''); setSelDate(today); setShowModal(false); setEditTarget(null);
            try { await api.post({action:'updateJournal',id:editTarget,date:selDate,content:content.trim()}); reload(); }
            catch(e){ showToast('수정 실패','error'); reload(); }
        } else {
            const newJ = {ID:'temp-'+Date.now(),Date:selDate,TeacherName:user.name,Content:content.trim(),CreatedAt:new Date().toISOString()};
            setJournals(prev=>[newJ,...prev]); showToast('일지가 저장되었습니다'); setContent(''); setShowModal(false);
            try { await api.post({action:'addJournal',date:selDate,teacherName:user.name,content:content.trim()}); reload(); }
            catch(e){ showToast('저장 실패','error'); reload(); }
        }
        setSaving(false);
    };

    return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12,paddingBottom:40}}>
            <PrintHeader title={`근무 일지 — ${user.name} 강사`} dateFrom={dateFrom} dateTo={dateTo}/>
            <div className="no-print" style={{display:'flex',justifyContent:'flex-end'}}>
                <button className="btn-primary btn-green" onClick={()=>{setContent('');setSelDate(today);setEditTarget(null);setShowModal(true);}}>
                    <Icon name="pencil" size={15}/> 일지 작성
                </button>
            </div>
            <PrintFilterBar dateFrom={dateFrom} dateTo={dateTo} onDateFrom={setDateFrom} onDateTo={setDateTo}
                count={filtered.length} total={myJournals.length} onPrint={()=>window.print()}/>
            {filtered.length===0 ? <div className="empty-box"><p style={{fontWeight:700}}>작성한 일지가 없습니다</p></div> :
                filtered.map(j=>(
                    <div key={j.ID} className="list-item" style={{position:'relative',paddingRight:72}}>
                        <div className="list-meta"><span className="badge badge-done">{formatDate(j.Date)}</span><span>{j.TeacherName}</span></div>
                        <div className="list-content">{j.Content}</div>
                        <div style={{position:'absolute',top:12,right:12,display:'flex',gap:4}} className="no-print">
                            <button onClick={()=>{setContent(j.Content);setSelDate(normalizeDate(j.Date));setEditTarget(j.ID);setShowModal(true);}} style={{color:'#94a3b8',padding:6,borderRadius:8,background:'#f8fafc'}}><Icon name="pencil" size={13}/></button>
                            <button onClick={async()=>{if(!confirm('삭제?'))return;setJournals(prev=>prev.filter(x=>x.ID!==j.ID));showToast('삭제됨');try{await api.post({action:'deleteJournal',id:String(j.ID)});reload();}catch{showToast('실패','error');}}} style={{color:'#cbd5e1',padding:6,borderRadius:8,background:'#f8fafc'}}><Icon name="trash" size={13}/></button>
                        </div>
                    </div>
                ))
            }
            {showModal && (
                <div className="modal-overlay no-print" onClick={e=>e.target===e.currentTarget&&(setShowModal(false),setEditTarget(null))}>

                        <div className="modal-title">{editTarget?'일지 수정':'근무 일지 작성'}</div>
                        <div><div className="form-label">날짜</div><input className="form-input" type="date" value={selDate} onChange={e=>setSelDate(e.target.value)}/></div>
                        <div><div className="form-label">내용</div><textarea className="form-textarea" value={content} onChange={e=>setContent(e.target.value)} placeholder="오늘 특이사항, 수업 내용 등" style={{minHeight:120}}/></div>
                        <div className="modal-btns">
                            <button className="btn-cancel" onClick={()=>{setShowModal(false);setEditTarget(null);}}>취소</button>
                            <button className="btn-confirm" style={{background:'#10b981'}} onClick={handleSave} disabled={saving}>{saving?'저장 중...':editTarget?'수정':'저장'}</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

            try{await api.post({action:'updateCounsel',id:editTarget,...form});reload();}catch(e){showToast('실패','error');reload();}
        } else {
            setCounsels(prev=>[{ID:'temp-'+Date.now(),Date:form.date,StudentName:form.studentName,ParentName:form.parentName||'',Content:form.content,TeacherName:user.name,CreatedAt:new Date().toISOString()},...prev]);
            showToast('저장됨'); setForm({date:today,studentName:'',parentName:'',content:''}); setShowModal(false);
            try{await api.post({action:'addCounsel',...form,teacherName:user.name});reload();}catch(e){showToast('실패','error');reload();}
        }
        setSaving(false);
    };

    return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12,paddingBottom:40}}>
            <PrintHeader title={`상담 기록 — ${user.name} 강사`} dateFrom={dateFrom} dateTo={dateTo}/>
            <div className="no-print" style={{display:'flex',justifyContent:'flex-end'}}>
                <button className="btn-primary btn-purple" onClick={()=>{setForm({date:today,studentName:'',parentName:'',content:''});setEditTarget(null);setShowModal(true);}}>
                    <Icon name="chat" size={15}/> 상담 기록 추가
                </button>
            </div>
            <PrintFilterBar dateFrom={dateFrom} dateTo={dateTo} onDateFrom={setDateFrom} onDateTo={setDateTo}
                count={filtered.length} total={myCounsels.length} onPrint={()=>window.print()}/>
            {filtered.length===0 ? <div className="empty-box"><p style={{fontWeight:700}}>상담 기록이 없습니다</p></div> :
                filtered.map(c=>(
                    <div key={c.ID} className="list-item" style={{position:'relative',paddingRight:72}}>
                        <div className="list-meta"><span className="badge badge-blue">{formatDate(c.Date)}</span><span style={{fontWeight:900,color:'#1e293b'}}>{c.StudentName}</span>{c.ParentName&&<span>학부모: {c.ParentName}</span>}</div>
                        <div className="list-content">{c.Content}</div>
                        <div style={{fontSize:11,fontWeight:700,color:'#cbd5e1'}}>{c.TeacherName}</div>
                        <div style={{position:'absolute',top:12,right:12,display:'flex',gap:4}} className="no-print">
                            <button onClick={()=>{setForm({date:normalizeDate(c.Date),studentName:c.StudentName,parentName:c.ParentName||'',content:c.Content});setEditTarget(c.ID);setShowModal(true);}} style={{color:'#94a3b8',padding:6,borderRadius:8,background:'#f8fafc'}}><Icon name="pencil" size={13}/></button>
                            <button onClick={async()=>{if(!confirm('삭제?'))return;setCounsels(prev=>prev.filter(x=>x.ID!==c.ID));showToast('삭제됨');try{await api.post({action:'deleteCounsel',id:String(c.ID)});reload();}catch{showToast('실패','error');}}} style={{color:'#cbd5e1',padding:6,borderRadius:8,background:'#f8fafc'}}><Icon name="trash" size={13}/></button>
                        </div>
                    </div>
                ))
            }
            {showModal && (
                <div className="modal-overlay no-print" onClick={e=>e.target===e.currentTarget&&(setShowModal(false),setEditTarget(null))}>
                    <div className="modal-box">
                        <div className="modal-title">{editTarget?'상담 수정':'학부모 상담 기록'}</div>
                        <div><div className="form-label">날짜</div><input className="form-input" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                            <div><div className="form-label">학생 이름</div><input className="form-input" value={form.studentName} onChange={e=>setForm(f=>({...f,studentName:e.target.value}))} placeholder="학생 이름"/></div>
                            <div><div className="form-label">학부모 이름 (선택)</div><input className="form-input" value={form.parentName} onChange={e=>setForm(f=>({...f,parentName:e.target.value}))} placeholder="학부모 성함"/></div>
                        </div>
                        <div><div className="form-label">상담 내용</div><textarea className="form-textarea" value={form.content} onChange={e=>setForm(f=>({...f,content:e.target.value}))} placeholder="상담 내용" style={{minHeight:130}}/></div>
                        <div className="modal-btns">
                            <button className="btn-cancel" onClick={()=>{setShowModal(false);setEditTarget(null);}}>취소</button>
                            <button className="btn-confirm" style={{background:'#8b5cf6'}} onClick={handleSave} disabled={saving}>{saving?'저장 중...':editTarget?'수정':'저장'}</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

/* ━━━ 관리자 대시보드 ━━━ */
const AdminDashboard = ({ journals, counsels, absences, notices, teachers, today }) => {
    const [dateFrom, setDateFrom] = useState('');
    const [dateTo,   setDateTo]   = useState('');
    const [teacherFilter, setTeacherFilter] = useState('ALL');

    const todayJournals = journals.filter(j=>normalizeDate(j.Date)===today);
    const todayAbsences = absences.filter(a=>normalizeDate(a.Date)===today);
    const thisMonth = today.substring(0,7);
    const monthCounsels = counsels.filter(c=>c.Date&&normalizeDate(c.Date).startsWith(thisMonth));

    const printFilter = (arr) => arr.filter(item => {
        const d = normalizeDate(item.Date);
        if (dateFrom && d < dateFrom) return false;
        if (dateTo   && d > dateTo)   return false;
        if (teacherFilter !== 'ALL' && item.TeacherName !== teacherFilter) return false;
        return true;
    });

    const pJournals = printFilter(journals);
    const pAbsences = printFilter(absences);
    const pCounsels = printFilter(counsels);

    return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20,paddingBottom:40}}>
            <PrintHeader title="전체 통합 보고서" dateFrom={dateFrom} dateTo={dateTo} teacherName={teacherFilter!=='ALL'?teacherFilter:null}/>
            <div style={{background:'#f8fafc',border:'1px solid #f1f5f9',borderRadius:20,padding:'16px 20px'}} className="no-print">
                <div style={{fontSize:12,fontWeight:900,color:'#94a3b8',marginBottom:12,letterSpacing:'.05em'}}>🖨️ 통합 인쇄 설정</div>
                <PrintFilterBar
                    dateFrom={dateFrom} dateTo={dateTo} onDateFrom={setDateFrom} onDateTo={setDateTo}
                    count={pJournals.length+pAbsences.length+pCounsels.length}
                    total={journals.length+absences.length+counsels.length}
                    onPrint={()=>window.print()}
                    showTeacherFilter={true}
                    teacherFilter={teacherFilter} onTeacherFilter={setTeacherFilter}
                    teachers={teachers}
                />
                <div style={{marginTop:10,display:'flex',gap:12,fontSize:12,fontWeight:700,color:'#64748b'}}>
                    <span>📋 근무일지 <strong style={{color:'#10b981'}}>{pJournals.length}건</strong></span>
                    <span>⚠️ 결석사유 <strong style={{color:'#ef4444'}}>{pAbsences.length}건</strong></span>
                    <span>💬 상담기록 <strong style={{color:'#8b5cf6'}}>{pCounsels.length}건</strong></span>
                </div>
            </div>

            <div className="print-only">
                <div className="print-section-title green">📋 근무 일지 ({pJournals.length}건)</div>
                {pJournals.length===0 ? <p style={{color:'#94a3b8',fontSize:12}}>내역 없음</p> :
                    pJournals.map(j=>(
                        <div key={j.ID} className="list-item" style={{marginBottom:8}}>
                            <div className="list-meta"><span className="badge badge-done">{formatDate(j.Date)}</span><span style={{fontWeight:900}}>{j.TeacherName} 강사</span></div>
                            <div className="list-content">{j.Content}</div>
                        </div>
                    ))
                }
                <div className="print-section-title red" style={{marginTop:24}}>⚠️ 결석 사유 ({pAbsences.length}건)</div>
                {pAbsences.length===0 ? <p style={{color:'#94a3b8',fontSize:12}}>내역 없음</p> :
                    pAbsences.map(a=>(
                        <div key={a.ID} className="list-item" style={{marginBottom:8}}>
                            <div className="list-meta"><span className="badge badge-new">{formatDate(a.Date)}</span><span style={{fontWeight:900}}>{a.StudentName}</span>{a.ClassName&&<span style={{color:'#94a3b8'}}>{a.ClassName}</span>}<span style={{marginLeft:'auto',color:'#94a3b8'}}>{a.TeacherName}</span></div>
                            <div className="list-content">{a.Reason}</div>
                        </div>
                    ))
                }
                <div className="print-section-title purple" style={{marginTop:24}}>💬 상담 기록 ({pCounsels.length}건)</div>
                {pCounsels.length===0 ? <p style={{color:'#94a3b8',fontSize:12}}>내역 없음</p> :
                    pCounsels.map(c=>(
                        <div key={c.ID} className="list-item" style={{marginBottom:8}}>
                            <div className="list-meta"><span className="badge badge-blue">{formatDate(c.Date)}</span><span style={{fontWeight:900}}>{c.StudentName}</span>{c.ParentName&&<span>학부모: {c.ParentName}</span>}<span style={{marginLeft:'auto',color:'#94a3b8'}}>{c.TeacherName}</span></div>
                            <div className="list-content">{c.Content}</div>
                        </div>
                    ))
                }
            </div>

            <div className="no-print">
                <div className="grid-3">
                    {[
                        {label:'오늘 일지 작성', val:`${todayJournals.length}건`, color:'#10b981'},
                        {label:'오늘 결석 사유', val:`${todayAbsences.length}건`, color:'#ef4444'},
                        {label:'이번달 상담',    val:`${monthCounsels.length}건`, color:'#8b5cf6'},
                    ].map(s=>(
                        <div key={s.label} className="stat-card">
                            <div className="stat-label">{s.label}</div>
                            <div className="stat-val" style={{color:s.color}}>{s.val}</div>
                        </div>
                    ))}
                </div>
                <div style={{marginTop:16}} className="grid-2">
                    <div className="card">
                        <div className="card-title">오늘 강사별 일지 현황</div>
                        {teachers.length===0 ? <div style={{fontSize:13,color:'#94a3b8',fontWeight:700}}>등록된 강사가 없습니다</div> :
                            teachers.map(t=>{
                                const done = todayJournals.some(j=>j.TeacherName===t.Name);
                                return (
                                    <div key={t.ID} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #f8fafc'}}>
                                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                                            <div style={{width:30,height:30,borderRadius:'50%',background:'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:900,color:'#475569'}}>{t.Name[0]}</div>
                                            <span style={{fontSize:13,fontWeight:900,color:'#1e293b'}}>{t.Name}</span>
                                        </div>
                                        <span className={`badge ${done?'badge-done':'badge-warn'}`}>{done?'작성 완료':'미작성'}</span>
                                    </div>
                                );
                            })
                        }
                    </div>
                    <div className="card">
                        <div className="card-title">오늘 결석 사유</div>
                        {todayAbsences.length===0 ? <div style={{fontSize:13,color:'#94a3b8',fontWeight:700}}>입력된 결석 사유가 없습니다</div> :
                            todayAbsences.map(a=>(
                                <div key={a.ID} style={{padding:'10px 0',borderBottom:'1px solid #f8fafc'}}>
                                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                                        <span style={{fontSize:13,fontWeight:900,color:'#1e293b'}}>{a.StudentName}</span>
                                        {a.ClassName&&<span style={{fontSize:11,color:'#94a3b8',fontWeight:700}}>{a.ClassName}</span>}
                                    </div>
                                    <div style={{fontSize:12,color:'#64748b',fontWeight:700}}>{a.Reason}</div>
                                    <div style={{fontSize:11,color:'#cbd5e1',fontWeight:700,marginTop:2}}>{a.TeacherName}</div>
                                </div>
                            ))
                        }
                    </div>
                </div>
                <div className="card" style={{marginTop:16}}>
                    <div className="card-title">최근 공지사항</div>
                    {notices.slice(0,3).map(n=>(
                        <div key={n.ID} className="notice-item">
                            <div className="notice-title">{n.Title}</div>
                            <div className="notice-body" style={{whiteSpace:'pre-wrap'}}>{n.Content}</div>
                            <div className="notice-date">{n.CreatedAt?formatDateTime(n.CreatedAt):''}</div>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );
};

/* ━━━ 강사 계정 관리 ━━━ */
const TeacherMgr = ({ teachers, showToast, reload, isSuper }) => {
    const [expanded, setExpanded] = useState(null);
    const [tab, setTab] = useState('teacher');
    const ADMIN_LIST = ['김남탁','김유식','사공은경','김윤희','홍상진'];

    const handleResetTeacherPw = async (name) => {
        if (!confirm(`${name} 강사의 비번을 1234로 초기화할까요?`)) return;
        try { await api.post({action:'resetTeacherPw',name}); showToast(`${name} 강사 비번 초기화됨`); reload(); }
        catch(e){ showToast('초기화 실패','error'); }
    };
    const handleDeleteTeacher = async (id, name) => {
        if (!confirm(`${name} 강사 계정을 삭제하시겠습니까?`)) return;
        try { await api.post({action:'deleteTeacher',id}); showToast('삭제됨'); reload(); }
        catch(e){ showToast('삭제 실패','error'); }
    };
    const handleApproveTeacher = async (id, name) => {
        try { await api.post({action:'approveTeacher',id}); showToast(`${name} 강사 승인됐습니다`); reload(); }
        catch(e){ showToast('승인 실패','error'); }
    };
    const handleRejectTeacher = async (id, name) => {
        if (!confirm(`${name} 강사 신청을 거절하시겠습니까?\n계정이 삭제됩니다.`)) return;
        try { await api.post({action:'rejectTeacher',id}); showToast(`${name} 강사 신청이 거절됐습니다`); reload(); }
        catch(e){ showToast('거절 실패','error'); }
    };

    return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12,paddingBottom:40}}>
            <div style={{display:'flex',gap:8}}>
                <button onClick={()=>setTab('teacher')} style={{flex:1,padding:'10px',borderRadius:14,fontSize:13,fontWeight:900,background:tab==='teacher'?'#0f172a':'#f8fafc',color:tab==='teacher'?'#fff':'#94a3b8'}}>강사 계정</button>
                <button onClick={()=>setTab('admin')} style={{flex:1,padding:'10px',borderRadius:14,fontSize:13,fontWeight:900,background:tab==='admin'?'#f97316':'#f8fafc',color:tab==='admin'?'#fff':'#94a3b8'}}>관리자 계정</button>
            </div>
            {tab==='teacher' && (
                <>
                    <div style={{padding:'14px 18px',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:14,fontSize:12,fontWeight:700,color:'#166534',lineHeight:1.9}}>
                        <div style={{fontWeight:900,marginBottom:4}}>강사 계정 안내</div>
                        <div>• 초기 비번: <span style={{color:'#16a34a',fontWeight:900}}>1234</span></div>
                        <div>• 강사가 첫 로그인하면 자동으로 목록에 등록됩니다</div>
                        {!isSuper && <div style={{color:'#94a3b8',marginTop:4}}>• 비번 초기화는 슈퍼관리자만 가능합니다</div>}
                    </div>
                    {(teachers||[]).length===0
                        ? <div className="empty-box"><p style={{fontWeight:700}}>등록된 강사가 없습니다</p></div>
                        : (teachers||[]).map(t=>{
                            const labels = getClassLabels(t.Classes||'');
                            const isExp = expanded===t.ID;
                            return (
                                <div key={t.ID} className="list-item" style={{gap:12}}>
                                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                                            <div style={{width:40,height:40,borderRadius:'50%',background:t.Status==='pending'?'#f59e0b':t.IsFirst?'#94a3b8':'#0f172a',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:900}}>{(t.Name||'?')[0]}</div>
                                            <div>
                                                <div style={{display:'flex',alignItems:'center',gap:6}}>
                                                    <span style={{fontSize:14,fontWeight:900,color:'#1e293b'}}>{t.Name} 강사</span>
                                                    {t.Status==='pending' && <span className="badge" style={{background:'#fef3c7',color:'#d97706'}}>⏳ 승인 대기</span>}
                                                    {t.Status!=='pending' && t.IsFirst&&<span className="badge badge-warn">설정 미완료</span>}
                                                </div>
                                                <div style={{fontSize:11,fontWeight:700,color:'#94a3b8'}}>담당 {labels.length}개 반</div>
                                            </div>
                                        </div>
                                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                                            {t.Status==='pending' ? (
                                                <>
                                                    <button onClick={()=>handleApproveTeacher(t.ID,t.Name)} style={{fontSize:11,fontWeight:900,padding:'6px 12px',borderRadius:10,background:'#10b981',color:'#fff'}}>✅ 승인</button>
                                                    <button onClick={()=>handleRejectTeacher(t.ID,t.Name)} style={{fontSize:11,fontWeight:900,padding:'6px 12px',borderRadius:10,background:'#ef4444',color:'#fff'}}>❌ 거절</button>
                                                </>
                                            ) : (
                                                <>
                                                    <button onClick={()=>setExpanded(isExp?null:t.ID)} style={{fontSize:11,fontWeight:900,padding:'6px 10px',borderRadius:10,background:isExp?'#f1f5f9':'#f8fafc',color:'#64748b'}}>{isExp?'접기':'담당반'}</button>
                                                    {isSuper && <button onClick={()=>handleResetTeacherPw(t.Name)} style={{fontSize:11,fontWeight:900,padding:'6px 10px',borderRadius:10,background:'#fff7ed',color:'#f97316',border:'1px solid #fed7aa'}}>비번 초기화</button>}
                                                    {isSuper && <button onClick={()=>handleDeleteTeacher(t.ID,t.Name)} style={{color:'#cbd5e1',padding:6}}><Icon name="trash" size={14}/></button>}
                                                </>
                                            )}
                                        </div>
                                    </div>
                                    {isExp&&(
                                        <div style={{background:'#f8fafc',borderRadius:12,padding:12}}>
                                            {labels.length===0?<div style={{fontSize:12,color:'#94a3b8',fontWeight:700}}>담당 반 없음</div>:
                                                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>{labels.map((l,i)=><span key={i} style={{fontSize:11,fontWeight:900,padding:'4px 10px',borderRadius:10,background:'#0f172a',color:'#fff'}}>{l}</span>)}</div>}
                                        </div>
                                    )}
                                </div>
                            );
                        })
                    }
                </>
            )}
            {tab==='admin' && (
                <>
                    <div style={{padding:'14px 18px',background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:14,fontSize:12,fontWeight:700,color:'#92400e',lineHeight:1.9}}>
                        <div style={{fontWeight:900,marginBottom:4}}>관리자 계정 안내</div>
                        <div>• 관리자 비번은 별도 안내된 비번을 사용해 주세요</div>
                    </div>
                    {ADMIN_LIST.map((name,i)=>(
                        <div key={i} className="list-item" style={{flexDirection:'row',alignItems:'center',justifyContent:'space-between'}}>
                            <div style={{display:'flex',alignItems:'center',gap:10}}>
                                <div style={{width:40,height:40,borderRadius:'50%',background:'#f97316',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:900}}>{name[0]}</div>
                                <div><span style={{fontSize:14,fontWeight:900,color:'#1e293b'}}>{name} 관리자</span><div style={{fontSize:11,fontWeight:700,color:'#94a3b8'}}>일반 관리자</div></div>
                            </div>
                        </div>
                    ))}
                </>
            )}
        </div>
    );
};

        </div>
        <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',borderTop:'1px solid #f8fafc',paddingTop:8}}>
            {value?<><span style={{color:'#f97316',fontWeight:900}}>{count}건</span> / 전체 {total}건{count===0&&<span style={{color:'#ef4444',marginLeft:12}}>검색 결과가 없습니다</span>}</>:<>전체 <span style={{color:'#1e293b',fontWeight:900}}>{total}건</span></>}
        </div>
    </div>
);

const Highlight = ({ text, keyword }) => {
    if (!keyword||!text) return <>{text}</>;
    const parts = String(text).split(new RegExp(`(${keyword})`, 'gi'));
    return <>{parts.map((p,i)=>p.toLowerCase()===keyword.toLowerCase()?<mark key={i} style={{background:'#fef08a',borderRadius:3,padding:'0 2px'}}>{p}</mark>:p)}</>;
};

/* ━━━ 관리자용 전체 뷰 ━━━ */
const JournalAllView = ({ journals, teachers }) => {
    const [q, setQ] = useState('');
    const [dateFrom, setDateFrom] = useState('');
    const [dateTo,   setDateTo]   = useState('');
    const [teacherFilter, setTeacherFilter] = useState('ALL');
    const sorted = sortByCreatedAt(journals);
    const filtered = sorted.filter(j => {
        const d = normalizeDate(j.Date);
        if (dateFrom && d < dateFrom) return false;
        if (dateTo   && d > dateTo)   return false;
        if (teacherFilter !== 'ALL' && j.TeacherName !== teacherFilter) return false;
        if (q && ![j.TeacherName,j.Content,j.Date].some(v=>String(v).includes(q))) return false;
        return true;
    });
    return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12,paddingBottom:40}}>
            <PrintHeader title="근무 일지 전체" dateFrom={dateFrom} dateTo={dateTo} teacherName={teacherFilter!=='ALL'?teacherFilter:null}/>
            <PrintFilterBar dateFrom={dateFrom} dateTo={dateTo} onDateFrom={setDateFrom} onDateTo={setDateTo}
                count={filtered.length} total={sorted.length} onPrint={()=>window.print()}
                showTeacherFilter={true} teacherFilter={teacherFilter} onTeacherFilter={setTeacherFilter} teachers={teachers}/>
            <SearchBar value={q} onChange={setQ} placeholder="강사명, 내용으로 검색..." count={filtered.length} total={sorted.length}/>
            {filtered.length===0?<div className="empty-box"><p style={{fontWeight:700}}>검색 결과가 없습니다</p></div>:
                filtered.map(j=>(
                    <div key={j.ID} className="list-item">
                        <div className="list-meta"><span className="badge badge-done">{formatDate(j.Date)}</span><span style={{fontWeight:900,color:'#1e293b'}}><Highlight text={j.TeacherName} keyword={q}/> 강사</span></div>
                        <div className="list-content"><Highlight text={j.Content} keyword={q}/></div>
                    </div>
                ))
            }
        </div>
    );
};

/* ━━━ 메인 앱 ━━━ */
const App = () => {
    const [user, setUser] = useState(null);
    if (!user) return <LoginScreen onLogin={u=>setUser(u)}/>;
    if (user.role==='teacher' && user.status==='pending') return <PendingScreen user={user} onLogout={()=>setUser(null)}/>;
    if (user.role==='teacher' && user.isFirst) return <SetupScreen user={user} onDone={u=>setUser(u)}/>;
    if (user.role==='admin') return <AdminApp user={user} onLogout={()=>setUser(null)}/>;
    return <TeacherApp user={user} onLogout={()=>setUser(null)}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
